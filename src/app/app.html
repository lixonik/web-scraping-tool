<div class="panel">
  <nz-divider
    [nzText]="templateVariables.dividers.browser"
    nzOrientation="left"
  ></nz-divider>
  <app-browser-section></app-browser-section>

  <nz-divider
    [nzText]="templateVariables.dividers.element"
    nzOrientation="left"
  ></nz-divider>
  <app-element-section
    [isHandledPageReady]="isHandledPageReady"
  ></app-element-section>

  <nz-divider
    [nzText]="templateVariables.dividers.tools"
    nzOrientation="left"
  ></nz-divider>
  <app-tools-section
    [isHandledPageReady]="isHandledPageReady"
  ></app-tools-section>

  <nz-divider
    [nzText]="templateVariables.dividers.logs"
    nzOrientation="left"
  ></nz-divider>
  <div class="section grow">
    <app-terminal></app-terminal>
  </div>
</div>
